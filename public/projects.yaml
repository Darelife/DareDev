  - title: "ML-Guided Tiered Storage Simulator & Cache Optimizer"
    desc: "Built a PyTorch middleware and 3-tier storage simulator to tackle the GPU 'I/O Wall' during ResNet-18 training. I benchmarked custom learning-based cache eviction policies against a standard LRU baseline. Interestingly, while the XGBoost and Contextual Bandit models drastically reduced I/O latency, the pure loss-driven existing approach (The SHADE paper) actually outperformed the more complex AI ensembles. Made for the DSTN course."
    techstack:
      - "Python"
      - "PyTorch"
      - "XGBoost"
      - "Systems Architecture"
